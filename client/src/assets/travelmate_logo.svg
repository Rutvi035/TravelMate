<svg width="100%" viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="200" y="30" width="280" height="140" rx="16" fill="#0a1628" style="fill:rgb(10, 22, 40);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Globe circle -->
  <circle cx="260" cy="100" r="38" fill="none" stroke="#e8b84b" stroke-width="2" style="fill:none;stroke:rgb(232, 184, 75);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Latitude lines -->
  <ellipse cx="260" cy="100" rx="38" ry="14" fill="none" stroke="#e8b84b" stroke-width="1" opacity="0.5" style="fill:none;stroke:rgb(232, 184, 75);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Equator line -->
  <line x1="222" y1="100" x2="298" y2="100" stroke="#e8b84b" stroke-width="1" opacity="0.5" style="fill:rgb(0, 0, 0);stroke:rgb(232, 184, 75);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Vertical meridian -->
  <ellipse cx="260" cy="100" rx="16" ry="38" fill="none" stroke="#e8b84b" stroke-width="1" opacity="0.5" style="fill:none;stroke:rgb(232, 184, 75);color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Plane shape flying over globe -->
  <!-- Fuselage -->
  <ellipse cx="272" cy="82" rx="18" ry="5.5" fill="#e8b84b" transform="rotate(-30 272 82)" style="fill:rgb(232, 184, 75);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Left wing -->
  <polygon points="268,80 258,68 270,77" fill="#e8b84b" opacity="0.9" style="fill:rgb(232, 184, 75);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.9;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Right wing -->
  <polygon points="276,84 288,94 274,85" fill="#e8b84b" opacity="0.9" style="fill:rgb(232, 184, 75);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.9;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Tail fin -->
  <polygon points="258,87 253,80 261,85" fill="#e8b84b" opacity="0.85" style="fill:rgb(232, 184, 75);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.85;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Dashed flight path arc -->
  <path d="M230 118 Q260 60 292 80" fill="none" stroke="#e8b84b" stroke-width="1.2" stroke-dasharray="4 3" opacity="0.5" style="fill:none;stroke:rgb(232, 184, 75);color:rgb(255, 255, 255);stroke-width:1.2px;stroke-dasharray:4px, 3px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- TravelMate text -->
  <text x="310" y="88" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#e8b84b" letter-spacing="1" style="fill:rgb(232, 184, 75);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:22px;font-weight:700;text-anchor:start;dominant-baseline:auto">Travel</text>
  <text x="310" y="116" font-family="Georgia, serif" font-size="22" font-weight="400" fill="#ffffff" letter-spacing="2" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:22px;font-weight:400;text-anchor:start;dominant-baseline:auto">Mate</text>

  <!-- Tagline -->
  <text x="310" y="135" font-family="Arial, sans-serif" font-size="9" fill="#e8b84b" opacity="0.6" letter-spacing="2.5" style="fill:rgb(232, 184, 75);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.6;font-family:Arial, sans-serif;font-size:9px;font-weight:400;text-anchor:start;dominant-baseline:auto">PLAN · COMPARE · EXPLORE</text>
</svg>